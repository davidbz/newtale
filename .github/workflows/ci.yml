name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: raven-actions/actionlint@v2

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check

      - name: Format
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install -r requirements.txt

      - name: Run unit tests
        run: uv run pytest tests/unit -x -q --tb=short

  pyright:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install -r requirements.txt

      - uses: jakebailey/pyright-action@v3
        with:
          # Tell pyright to use the .venv created by uv
          extra-args: --pythonpath .venv/bin/python
