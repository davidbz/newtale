# Single-GPU demo run — ~75M params, shows loss decrease in ~15 min
model:
  hidden_size: 512
  num_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 4
  intermediate_size: 1536
  max_position_embeddings: 1024
  rope_theta: 500000.0
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: false

data:
  tokenizer_dir: tokenizer/
  sources:
    - path: HuggingFaceFW/fineweb-edu
      weight: 0.70
      name: fineweb-edu
      split: train
      subset: sample-10BT
    - path: bigcode/starcoderdata
      weight: 0.30
      name: starcoderdata
      split: train
      text_column: content
  seq_length: 1024
  seed: 42

training:
  output_dir: checkpoints/small
  max_steps: 300
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 30
  min_lr_ratio: 0.1
  distributed_backend: fsdp
  zero_stage: 0
  gradient_checkpointing: false
  compile: false
  logging_steps: 10
  eval_steps: 150
  save_steps: 150
  save_total_limit: 2
  seed: 42
  dataloader_num_workers: 0

logging:
  use_wandb: false
