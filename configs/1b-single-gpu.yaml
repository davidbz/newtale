# 1B model on a single A10G (23GB). ~2h for 500 steps.
model:
  hidden_size: 2048
  num_layers: 22
  num_attention_heads: 16
  num_key_value_heads: 8
  intermediate_size: 5632
  max_position_embeddings: 2048
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: false

data:
  tokenizer_dir: tokenizer/
  sources:
    - path: HuggingFaceFW/fineweb-edu
      weight: 0.70
      name: fineweb-edu
      split: train
    - path: bigcode/starcoderdata
      weight: 0.30
      name: starcoderdata
      split: train
  seq_length: 2048
  seed: 42

training:
  output_dir: checkpoints/1b-single
  max_steps: 500
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 50
  min_lr_ratio: 0.1
  distributed_backend: fsdp
  zero_stage: 0
  gradient_checkpointing: true
  compile: false
  logging_steps: 10
  eval_steps: 250
  save_steps: 250
  save_total_limit: 2
  seed: 42
  dataloader_num_workers: 0

logging:
  use_wandb: false
  tensorboard_dir: runs/1b-single
