# CPU smoke-test config — 2 layers, hidden 128. Verifies the pipeline end-to-end.
model:
  vocab_size: 1000
  hidden_size: 128
  num_layers: 2
  num_attention_heads: 4
  num_key_value_heads: 2
  intermediate_size: 256
  max_position_embeddings: 64
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: false

data:
  tokenizer_dir: tokenizer/
  sources:
    - path: HuggingFaceFW/fineweb-edu
      weight: 0.70
      name: fineweb-edu
      split: train
    - path: bigcode/starcoderdata
      weight: 0.30
      name: starcoderdata
      split: train
  seq_length: 64
  seed: 42

training:
  output_dir: checkpoints/tiny
  max_steps: 10
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  lr: 1.0e-3
  betas: [0.9, 0.95]
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 2
  min_lr_ratio: 0.1
  distributed_backend: fsdp
  zero_stage: 0
  gradient_checkpointing: false
  compile: false
  dataloader_num_workers: 0
  logging_steps: 1
  eval_steps: 5
  save_steps: 5
  save_total_limit: 2
  seed: 42

logging:
  use_wandb: false
