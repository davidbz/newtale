model:
  vocab_size: 50000
  hidden_size: 3072
  num_layers: 28
  num_attention_heads: 24
  num_key_value_heads: 8
  intermediate_size: 8192
  max_position_embeddings: 4096
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-5
  tie_word_embeddings: false

data:
  tokenizer_dir: tokenizer/
  sources:
    - path: HuggingFaceFW/fineweb-edu
      weight: 0.70
      name: fineweb-edu
      split: train
    - path: bigcode/starcoderdata
      weight: 0.30
      name: starcoderdata
      split: train
      text_column: content
  seq_length: 4096
  seed: 42

training:
  output_dir: checkpoints/3b
  max_steps: 35700
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 2000
  min_lr_ratio: 0.1
  distributed_backend: deepspeed
  zero_stage: 2
  gradient_checkpointing: true
  compile: true
  logging_steps: 10
  eval_steps: 500
  save_steps: 1000
  save_total_limit: 3
  seed: 42

logging:
  use_wandb: false
  wandb_project: newtale
  tensorboard_dir: runs/3b
